plugins {
    id 'com.android.application'
}

android {
    namespace 'com.pda.alertrelay'
    compileSdk 33

    defaultConfig {
        applicationId "com.pda.alertrelay"
        minSdk 25
        targetSdk 25
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    lint {
        abortOnError false
    }
}

dependencies {
    // 无第三方依赖，保持轻量
}
